<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff5f7; overflow: hidden; touch-action: none; }
        .screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; background: #fff5f7; }
        .hidden { display: none !important; opacity: 0; }
        
        /* Card Styling */
        .card-stack { position: relative; width: 300px; height: 400px; }
        .love-card {
            position: absolute; inset: 0; background: white; border-radius: 25px;
            padding: 30px; text-align: center; display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #ffeef0;
            cursor: grab; transition: transform 0.1s; will-change: transform;
        }

        /* Envelope */
        .envelope { width: 250px; height: 160px; background: #ff8fa3; position: relative; border-radius: 0 0 10px 10px; cursor: pointer; }
        .flap { 
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 125px solid transparent; border-right: 125px solid transparent;
            border-top: 100px solid #ffb3c1; transform-origin: top; transition: 0.6s; z-index: 2;
        }
        .flap.open { transform: rotateX(180deg); z-index: 0; }

        .floating-heart { position: fixed; pointer-events: none; opacity: 0.4; animation: float 6s linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="screen-start" class="screen flex-col">
        <h1 class="text-3xl font-bold text-gray-800 mb-8">A little something for you ❤️</h1>
        <button id="btn-start" class="bg-pink-500 text-white px-12 py-4 rounded-full font-bold shadow-lg active:scale-90 transition">
            Open Now
        </button>
    </div>

    <div id="screen-swipe" class="screen hidden flex-col">
        <p class="text-pink-400 font-bold mb-6 tracking-widest uppercase text-xs">Swipe cards right ❤️</p>
        <div class="card-stack" id="card-stack"></div>
    </div>

    <div id="screen-envelope" class="screen hidden flex-col">
        <div class="envelope" id="envelope-trigger">
            <div class="flap" id="envelope-flap"></div>
            <div class="absolute inset-0 flex items-center justify-center text-white text-3xl">❤️</div>
        </div>
        <p class="mt-8 text-pink-500 font-medium italic">Tap the heart to open</p>
    </div>

    <div id="screen-letter" class="screen hidden flex-col p-6">
        <div class="bg-white w-full max-w-sm p-8 rounded-[30px] shadow-2xl overflow-y-auto max-h-[80vh]">
            <h2 class="text-2xl font-bold text-pink-600 mb-4">My Sweet Sixteen,</h2>
            <p id="letter-text" class="text-gray-700 leading-relaxed mb-6 h-auto"></p>
            <p class="text-right font-['Dancing_Script'] text-2xl text-pink-500">With love, Ankur</p>
            <button id="btn-surprise" class="w-full mt-6 py-4 bg-purple-100 text-purple-600 rounded-2xl font-bold">Tap for surprise 🎈</button>
        </div>
    </div>

    <script>
        const quotes = [
            "Every time I look at you, I see all the reasons my heart chose you.",
            "You are the most beautiful part of my day and my life.",
            "You show love in the smallest things, and that’s what makes it real.",
            "In your eyes, I see a love so pure, I’m lucky to be yours.",
            "You love me in ways I didn't know I needed.",
            "If love had a face, it would look like you—kind and warm."
        ];

        let currentCard = quotes.length - 1;

        // helper to switch screens
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // START BUTTON
        document.getElementById('btn-start').addEventListener('click', () => {
            show('screen-swipe');
            renderCards();
        });

        function renderCards() {
            const stack = document.getElementById('card-stack');
            quotes.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'love-card';
                card.style.zIndex = i;
                card.innerHTML = `<p class="text-lg text-gray-600 font-medium">"${text}"</p>`;
                setupSwipe(card);
                stack.appendChild(card);
            });
        }

        function setupSwipe(card) {
            let startX = 0;
            const move = (e) => {
                let x = e.touches ? e.touches[0].clientX : e.clientX;
                let dist = x - startX;
                if (dist > 0) card.style.transform = `translateX(${dist}px) rotate(${dist/15}deg)`;
            };
            const end = (e) => {
                let x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                if (x - startX > 100) {
                    card.style.transform = 'translateX(1000px) rotate(45deg)';
                    currentCard--;
                    if (currentCard < 0) setTimeout(() => show('screen-envelope'), 300);
                } else {
                    card.style.transform = '';
                }
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', end);
            };
            card.addEventListener('mousedown', (e) => { startX = e.clientX; document.addEventListener('mousemove', move); document.addEventListener('mouseup', end); });
            card.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; card.addEventListener('touchmove', move); card.addEventListener('touchend', end); });
        }

        // ENVELOPE
        document.getElementById('envelope-trigger').addEventListener('click', () => {
            document.getElementById('envelope-flap').classList.add('open');
            setTimeout(() => {
                show('screen-letter');
                typeLetter();
            }, 800);
        });

        function typeLetter() {
            const text = "Happy Birthday to the most beautiful soul I know. Loving you has been the most incredible journey of my life. You are my heart, my peace, and my greatest happiness.\n\nOn your birthday, I just want to promise you that I’ll always be there for you—through every smile, every tear, and every dream. You deserve all the love in the world, and I’ll spend my life making sure you feel it.";
            let i = 0;
            const el = document.getElementById('letter-text');
            const timer = setInterval(() => {
                el.innerHTML += text[i];
                i++;
                if (i >= text.length) clearInterval(timer);
            }, 30);
        }

        document.getElementById('btn-surprise').addEventListener('click', () => {
            confetti({ particleCount: 150, spread: 60, origin: { y: 0.7 } });
            document.getElementById('btn-surprise').innerText = "Happy 18th Birthday ❤️";
        });

        // Background Hearts
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }, 800);
    </script>
</body>
</html>
